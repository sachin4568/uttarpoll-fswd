version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: uttarpool-db
    environment:
      POSTGRES_USER: uttarpool_admin
      POSTGRES_PASSWORD: uttarpool_password
      POSTGRES_DB: uttarpool
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
